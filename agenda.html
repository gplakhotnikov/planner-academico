  <div class ="agenda">
    <div class="tabela">
      <div class="data">
        <button class="anterior">&lt;</button>
        <button class="proximo">&gt;</button>
        <span id = "mes"></span>
        <span id = "ano"></span>
      </div>
        
      <div class="semana"> 
        <div>Domingo</div>
        <div>Segunda</div>
        <div>Terça</div>
        <div>Quarta</div>
        <div>Quinta</div>
        <div>Sexta</div>
        <div>Sábado</div>
      </div>
      
      <div class="dias">
      </div>
    </div>
    
    <div class="funcionalidades">
    <div class="AdicionarEvento">
      <h3 id="eventoTitulo">Novo Evento</h3>
 
      <label>Título</label>
      <input type="text" id="inputTitulo" placeholder="Ex: Trabalho de PI">
 
      <label>Data</label>
      <input type="date" id="inputData">
 
      <label>Hora</label>
      <input type="time" id="inputHora">
 
      <input type="hidden" id="inputTipo" value="evento">
 
      <div class="modal-botoes">
        <button id="btnCancelar" class="cancelar">Cancelar</button>
        <button id="btnSalvar" class="salvar">Salvar</button>
      </div>
    </div>
  </div>
