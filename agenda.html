                     A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83

    </ul>
  </nav>

  <div class="container">
    <h1>Agenda</h1>

    <section class="agenda-layout">
      <!-- Calendário -->
      <div class="calendario-wrapper">
        <div class="calendario-header">
          <button class="btn-nav anterior">&lt;</button>
          <span class="mes-ano"><span id="mes"></span> <span id="ano"></span></span>
          <button class="btn-nav proximo">&gt;</button>
        </div>

        <div class="semana">
          <div>Dom</div>
          <div>Seg</div>
          <div>Ter</div>
          <div>Qua</div>
          <div>Qui</div>
          <div>Sex</div>
          <div>Sáb</div>
        </div>

        <div class="dias"></div>
      </div>

      <!-- Painel lateral -->
      <div class="painel-evento">
        <h3 id="eventoTitulo">Novo Evento</h3>

        <label for="inputTitulo">Título</label>
        <input type="text" id="inputTitulo" placeholder="Ex: Trabalho de PI">

        <label for="inputData">Data</label>
        <input type="date" id="inputData">

        <label for="inputHora">Hora</label>
        <input type="time" id="inputHora">

        <input type="hidden" id="inputTipo" value="evento">

        <div class="painel-botoes">
          <button id="btnExcluir" class="btn-excluir" style="display:none;">Excluir</button>
          <button id="btnCancelar" class="btn-cancelar">Cancelar</button>
          <button id="btnSalvar" class="btn-salvar">Salvar</button>
        </div>

        <div id="eventos-hoje" class="eventos-hoje-wrapper" style="display:none;">
          <h4 class="eventos-hoje-titulo">Eventos do dia</h4>
          <div id="lista-eventos-hoje"></div>
        </div>
      </div>
    </section>
  </div>

<script src="agenda.js"></script>
