<!DOCTYPE html>
<html lang="pt-br">
<head>
  <link rel="stylesheet" href="style.css">
  <meta charset="UTF-8">
  <title>Página de Cadastro</title>
</head>

<body>

  <div class="page">

    <main>
      <div class="container-cadastro">
        <h2>Planner Acadêmico UNIRIO</h2>
        <p><strong>Entrar</strong></p>
        
        <form>
          <div class="field">
          E-mail:  
          </div>
          
          <input type="email" placeholder="Digite seu e-mail" required>
          
          <div class="field">
          Senha:  
          </div>
          
          <input type="password" placeholder="Digite sua senha" required>

          <div class="buttons">
            <button type="reset" class="reset">Limpar</button>
            <button type="submit" class="submit">Enviar</button>
          </div>
        </form>
        
        <div class= bottomtext>
          Esqueceu sua senha? <a href="http://www.google.com">Recuperar senha</a>
          <br>
          Não possui conta? <a href="http://www.google.com">Criar senha</a>
        </div>
        
      </div>
    </main>

    <footer>
      <p>&copy; 2026 Coelho, Plakhotnikov, Trindade. Todos os direitos reservados.</p>
    </footer>

  </div>

</body>

</html>
